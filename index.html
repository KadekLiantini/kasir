<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kasir Mini</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header Fixed -->
      <header class="fixed-header">
        <div class="header-content">
          <h1>🛒 Kasir Mini</h1>
          <button class="history-icon-btn" id="historyBtn">📋</button>
        </div>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Cari produk..." />
        </div>
      </header>

      <!-- Kategori Fixed -->
      <div class="categories fixed-categories">
        <button class="category-btn active" data-category="all">Semua</button>
        <button class="category-btn" data-category="makanan">Makanan</button>
        <button class="category-btn" data-category="minuman">Minuman</button>
        <button class="category-btn" data-category="snack">Snack</button>
      </div>

      <!-- Daftar Produk (Area yang bisa di-scroll) -->
      <div class="product-area">
        <div class="product-grid" id="productGrid">
          <!-- Produk diisi oleh JavaScript -->
        </div>
      </div>

      <!-- Keranjang -->
      <div class="cart">
        <h2>Keranjang Belanja (<span id="cartCount">0</span>)</h2>
        <div class="cart-items" id="cartItems"></div>

        <div class="cart-total">
          <strong>Total: Rp <span id="totalAmount">0</span></strong>
        </div>

        <button class="btn-checkout" id="checkoutBtn">Selesai Transaksi</button>
      </div>
    </div>

    <!-- Modal Checkout -->
    <div class="modal" id="checkoutModal">
      <div class="modal-content">
        <h2>Checkout Transaksi</h2>
        <p><strong>Total Belanja:</strong> Rp <span id="modalTotal">0</span></p>

        <label for="paidAmount">Uang yang Dibayarkan:</label>
        <input
          type="number"
          id="paidAmount"
          placeholder="Masukkan nominal uang"
          min="0" />

        <p><strong>Kembalian:</strong> Rp <span id="changeAmount">0</span></p>

        <div class="modal-buttons">
          <button class="btn-cancel" id="cancelBtn">Batal</button>
          <button class="btn-confirm" id="confirmBtn">Simpan Transaksi</button>
        </div>
      </div>
    </div>

    <!-- Modal History -->
    <div class="modal" id="historyModal">
      <div class="modal-content history-modal">
        <h2>Riwayat Transaksi</h2>
        <div class="history-list" id="historyList">
          <!-- Riwayat diisi oleh JavaScript -->
        </div>
        <button class="btn-close" id="closeHistoryBtn">Tutup</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
